<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default SEO — overridden per page by react-helmet -->
    <title>Forcehead – Built for the Salesforce Ecosystem</title>
    <meta
      name="description"
      content="Forcehead is a B2B platform built for the Salesforce ecosystem where partners can outsource projects, hire certified consultants, exchange bench resources, and connect directly with clients to build trusted partnerships and drive real revenue"
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ForceHead" />
    <meta property="og:title" content="Forcehead – Built for the Salesforce Ecosystem" />
    <meta
      property="og:description"
      content="Forcehead is a B2B platform built for the Salesforce ecosystem where partners can outsource projects, hire certified consultants, exchange bench resources, and connect directly with clients to build trusted partnerships and drive real revenue"
    />
    <meta property="og:url" content="https://www.forcehead.com" />
    <meta property="og:image" content="https://www.forcehead.com/forceheadlogo.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Forcehead – Built for the Salesforce Ecosystem" />
    <meta
      name="twitter:description"
      content="Forcehead is a B2B platform built for the Salesforce ecosystem where partners can outsource projects, hire certified consultants, exchange bench resources, and connect directly with clients to build trusted partnerships and drive real revenue"
    />

    <!-- Canonical (overridden per page) -->
    <link rel="canonical" href="https://www.forcehead.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
